<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather App</title>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <div class="logo">Weather App</div>
                <div class="search">
                    <input type="text" name="weather_location" id="locInput"> </input>
                    <button class="search-button">
                        <img src="./asset/magnify.svg" alt="search">
                    </button>
                </div>
            </div class="header">
            <div class="content">
                <div>
                    <p class="temp">27°</p>
                    <div>
                        <p class="condition">Partially cloudy</p>
                        <p class="feels-like">Feels like 30°</p>
                    </div>
                    <p class="location"></p>
                </div>
            </div>
            
            
        </div>
    </body>
</html>
